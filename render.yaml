services:
  - type: web
    name: graphhopper-ai-route-planner
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: GRAPHHOPPER_API_KEY
        sync: false
